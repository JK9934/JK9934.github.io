<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>최후의 대결</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene-shell">
      <canvas id="scene" aria-label="최후의 대결 전투 장면"></canvas>
      <div class="vignette" aria-hidden="true"></div>
      <div class="hud">
        <strong>최후의 대결</strong>
        <span id="battle-state"></span>
      </div>
      <section class="control-panel" aria-label="Battle setup">
        <div class="panel-head">
          <div>
            <strong>대결 설정</strong>
            <span>키와 몸무게 기반 데모 능력치</span>
          </div>
          <button id="start-battle" type="button">시작</button>
        </div>
        <div class="teams">
          <div class="team-picker">
            <h2>1팀</h2>
            <label>
              <span>캐릭터</span>
              <select id="red-character" required></select>
            </label>
            <label>
              <span>인원</span>
              <input id="red-count" type="number" min="1" max="40" step="1" placeholder="1-40" />
            </label>
            <div id="red-preview" class="stat-preview"></div>
          </div>
          <div class="team-picker">
            <h2>2팀</h2>
            <label>
              <span>캐릭터</span>
              <select id="blue-character" required></select>
            </label>
            <label>
              <span>인원</span>
              <input id="blue-count" type="number" min="1" max="40" step="1" placeholder="1-40" />
            </label>
            <div id="blue-preview" class="stat-preview"></div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./scene.js"></script>
  </body>
</html>
